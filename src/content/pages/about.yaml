heading: "Meet Laurel"
subheading: "Photographer, mother, lover of golden hour."
bio: "I picked up a camera to hold onto the things that slip away too fast. Now I help families freeze the moments that matter: the belly that's about to become a baby, the toddler who won't stay this small, the way you two still look at each other after all these years. Based in Guanacaste, usually sandy, always chasing the light."
