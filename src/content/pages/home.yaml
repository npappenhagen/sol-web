testimonials:
  - quote: "After documenting our retreats ourselves for five years, hiring Laurel allowed us to finally be fully present with our guests. She understood the delicacy of the ceremonial space, and the images are already elevating the marketing for our future retreats."
    author: "Lawrie W."
    image: /media/testimonials/2026-testimonial-1.jpg
  - quote: "Having Laurel present at our retreat felt safe, supportive, and completely aligned. It's incredible to be witnessed and to embody Goddess energy in this way. I've done many types of photoshoots, but my favorite images have always been ceremonial. It feels like a return to self."
    author: "Jessica"
    context: "Reclamation Retreat"
    image: /media/testimonials/2026-testimonial-2.jpg
  - quote: "Thank you for giving us our dream pictures from our time in Costa Rica! My kids were so comfortable with Laurel and she made the entire photo shoot feel effortless and so fun. We are so so happy with our pictures. 10/10 recommend this incredibly talented photographer!"
    author: "Katie F."
    image: /media/testimonials/2026-testimonial-4.jpg
  - quote: "I cannot recommend Laurel enough. She took my favorite photos of my family ever and my kids said it was so much fun. She was super flexible and helpful with scheduling and location. She's truly amazing!"
    author: "Natalie E."
    image: /media/testimonials/2026-testimonial-5.jpg
  - quote: "Our session felt completely pressure-free. Laurel's warm energy put us at ease. When I saw our photos, I cried. As a mom always behind the camera, it was pure joy to finally be in the picture, and now I can't decide which one to print and frame first!"
    author: "Maureen N."
    image: /media/testimonials/2026-testimonial-3.jpg
