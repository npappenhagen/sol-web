hero_heading: "Light. Story. Memory."
intro_label: "WHY SOL"
intro_heading: "Because some moments deserve to be held."
intro_body: "I'm Laurel — a Costa Rica-based photographer who believes the best images come from real connection, not perfect poses. Whether it's the chaos of family mornings, the quiet of a couple at golden hour, or the energy of a creative building their brand — I'm here to witness it with you. My approach is simple: slow down, stay present, and let the light do its work. The result? Photos that feel like coming home."
